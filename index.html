<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#004883" />
    <title>Biblioteca Corporativa | Leitor de PDF</title>
    <script>
      // Compatibilidade para PDF.js 6 em navegadores que ainda não implementam
      // Uint8Array.prototype.toHex (Chrome/Edge corporativos e WebViews antigos).
      (() => {
        if (typeof Uint8Array.prototype.toHex !== 'function') {
          Object.defineProperty(Uint8Array.prototype, 'toHex', {
            configurable: true,
            writable: true,
            value: function toHex() {
              let hex = '';
              for (let i = 0; i < this.length; i += 1) {
                hex += this[i].toString(16).padStart(2, '0');
              }
              return hex;
            },
          });
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
