<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#004883">
<title>Biblioteca Corporativa | Lucena Infraestrutura</title>
<style>
:root{
  --blue:#004883;--blue-dark:#00345f;--red:#ef3340;--stage:#525252;
  --sidebar:300px;--zoom:1;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:var(--blue);color:#fff}
button,input{font:inherit}
button{border:0}
.app{width:100%;height:100%;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr);transition:grid-template-columns .22s ease}
.app.menu-closed{grid-template-columns:0 minmax(0,1fr)}
.sidebar{min-width:0;overflow:hidden;background:linear-gradient(180deg,#002f56,#004883);border-right:1px solid #ffffff22;display:grid;grid-template-rows:auto auto minmax(0,1fr);z-index:40}
.sidebar-inner{width:var(--sidebar);min-width:var(--sidebar);display:contents}
.brand{height:64px;display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid #ffffff20}
.brand-line{width:8px;height:38px;border-radius:8px;background:var(--red);flex:0 0 auto}
.brand strong{display:block;font-size:17px;line-height:1.05}.brand small{display:block;margin-top:4px;font-size:11px;opacity:.72}
.doc-filter{padding:12px}
.input-wrap{height:40px;display:flex;align-items:center;gap:8px;padding:0 11px;border:1px solid #ffffff2d;border-radius:10px;background:#ffffff10}
.input-wrap input{min-width:0;width:100%;border:0;outline:0;color:#fff;background:transparent;user-select:text}.input-wrap input::placeholder{color:#ffffffa0}
.doc-list{overflow:auto;padding:0 10px 14px;scrollbar-width:thin;scrollbar-color:#ffffff45 transparent}
.doc-item{width:100%;display:grid;grid-template-columns:34px minmax(0,1fr) 18px;gap:9px;align-items:center;padding:10px;border:1px solid transparent;border-radius:11px;background:transparent;color:#fff;text-align:left;cursor:pointer;margin-bottom:5px}
.doc-item:hover{background:#ffffff11}.doc-item.active{background:#fff;color:var(--blue-dark);box-shadow:0 8px 22px #0003}
.doc-icon{height:40px;border-radius:6px;display:grid;place-items:center;background:#ffffff18;font-size:9px;font-weight:800}.doc-item.active .doc-icon{background:var(--red);color:#fff}
.doc-name{font-size:13px;font-weight:700;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.doc-arrow{opacity:.45;font-size:18px}
.viewer{min-width:0;min-height:0;display:grid;grid-template-rows:56px minmax(0,1fr) 56px;background:var(--stage)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 10px;background:var(--blue);border-bottom:1px solid #ffffff1f;z-index:30}
.top-left,.top-right{display:flex;align-items:center;gap:7px;min-width:0}
.tool{height:40px;min-width:40px;padding:0 11px;border:1px solid #ffffff2b;border-radius:10px;background:#ffffff10;color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.tool:hover{background:#ffffff1d}.tool:disabled{opacity:.32;cursor:not-allowed}
.title{min-width:0}.title strong{display:block;max-width:min(47vw,700px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}.title small{display:block;margin-top:3px;font-size:10px;opacity:.65}
.mode{display:flex;height:40px;padding:3px;border:1px solid #ffffff2b;border-radius:10px;background:#0002}
.mode button{height:32px;padding:0 10px;border-radius:7px;background:transparent;color:#ffffffb8;cursor:pointer;font-size:12px;font-weight:700}
.mode button.active{background:#fff;color:var(--blue-dark)}
.stage{position:relative;min-width:0;min-height:0;overflow:auto;background:radial-gradient(circle at center,#ffffff11,transparent 50%),var(--stage);display:flex;align-items:center;justify-content:center;padding:12px}
.stage.document-mode{align-items:flex-start;justify-content:center;padding:18px 12px}
.book-scale{transform:scale(var(--zoom));transform-origin:center center;transition:transform .14s ease}
#book{filter:drop-shadow(0 24px 32px #0008)}
.page{background:#fff;overflow:hidden}.page img{width:100%;height:100%;display:block;object-fit:fill;background:#fff}
.doc-view{display:none;width:100%;flex-direction:column;align-items:center;gap:18px;padding-bottom:20px}
.stage.document-mode .doc-view{display:flex}.stage.document-mode .book-scale{display:none}
.doc-page{display:block;background:#fff;box-shadow:0 14px 34px #0007;max-width:none;height:auto}
.loader{position:absolute;inset:0;z-index:60;display:grid;place-items:center;background:var(--stage);transition:.2s}
.loader.hide{opacity:0;visibility:hidden;pointer-events:none}.load{text-align:center;padding:20px}.spinner{width:46px;height:46px;margin:0 auto 15px;border:4px solid #ffffff3b;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load b{display:block;font-size:17px}.load span{display:block;margin-top:7px;font-size:12px;opacity:.75}
.error{display:none;position:absolute;z-index:70;width:min(560px,90vw);padding:23px;border-radius:16px;background:#00345ff7;box-shadow:0 24px 60px #0007;text-align:center}.error.show{display:block}.error h2{margin:0 0 10px;font-size:20px}.error p{margin:0;font-size:13px;line-height:1.45}
.search-panel{display:none;position:absolute;top:66px;right:12px;z-index:80;width:min(390px,calc(100vw - 24px));max-height:72vh;background:#f7fafc;color:#173044;border-radius:14px;box-shadow:0 24px 65px #0009;overflow:hidden}.search-panel.open{display:grid;grid-template-rows:auto minmax(0,1fr)}
.search-head{padding:10px;border-bottom:1px solid #d6e0e7}.search-head .input-wrap{border-color:#c9d6df;background:#fff}.search-head input{color:#173044}.search-head input::placeholder{color:#748594}
.results{overflow:auto;padding:7px}.result{width:100%;padding:10px;border-radius:9px;background:transparent;color:#173044;text-align:left;cursor:pointer}.result:hover{background:#e7f1f7}.result b{display:block;color:var(--blue);margin-bottom:4px}.result span{font-size:12px;line-height:1.35;color:#586b7b}
.toolbar{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px calc(7px + env(safe-area-inset-bottom));background:var(--blue);border-top:1px solid #ffffff20}
.counter{min-width:88px;text-align:center;font-size:12px;font-weight:800}.zoom-label{min-width:46px;text-align:center;font-size:11px;opacity:.72}
.overlay{display:none;position:fixed;inset:0;background:#0008;z-index:35}
@media(max-width:900px){
  :root{--sidebar:min(310px,88vw)}
  .app,.app.menu-closed{grid-template-columns:1fr}
  .sidebar{position:fixed;inset:0 auto 0 0;width:var(--sidebar);transform:translateX(-102%);transition:transform .22s ease;box-shadow:18px 0 40px #0005}
  .sidebar.open{transform:translateX(0)}.overlay.show{display:block}
  .title strong{max-width:40vw}.label{display:none}
}
@media(max-width:620px){
  .viewer{grid-template-rows:52px minmax(0,1fr) 56px}.topbar{padding:6px}.title small{display:none}.title strong{max-width:35vw}.mode button{padding:0 8px;font-size:11px}.tool{padding:0 9px}.stage{padding:5px}.stage.document-mode{padding:10px 5px}.toolbar .tool:nth-of-type(1),.toolbar .tool:nth-of-type(5){display:none}
}
</style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<main class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="brand"><div class="brand-line"></div><div><strong>Biblioteca Corporativa</strong><small>Lucena Infraestrutura</small></div></div>
      <div class="doc-filter"><div class="input-wrap">⌕<input id="docFilter" type="search" placeholder="Localizar documento..."></div></div>
      <nav class="doc-list" id="docList"></nav>
    </div>
  </aside>

  <section class="viewer">
    <header class="topbar">
      <div class="top-left">
        <button class="tool" id="menuButton" title="Abrir ou fechar documentos">☰</button>
        <div class="title"><strong id="title">Biblioteca Corporativa</strong><small id="subtitle"></small></div>
      </div>
      <div class="top-right">
        <div class="mode" aria-label="Modo de visualização">
          <button id="bookMode" class="active">Livreto</button>
          <button id="documentMode">Documento</button>
        </div>
        <button class="tool" id="searchButton" title="Pesquisar no documento">⌕ <span class="label">Pesquisar</span></button>
        <button class="tool" id="downloadButton" title="Baixar PDF">⇩ <span class="label">Baixar</span></button>
        <button class="tool" id="fullscreenButton" title="Tela cheia">⛶</button>
      </div>
    </header>

    <section class="stage" id="stage">
      <div class="book-scale" id="bookScale"><div id="book"></div></div>
      <div class="doc-view" id="docView"></div>

      <div class="loader" id="loader"><div class="load"><div class="spinner"></div><b>Carregando documento</b><span id="loaderText">Localizando os PDFs...</span></div></div>
      <div class="error" id="error"><h2>Não foi possível abrir</h2><p id="errorText"></p></div>

      <div class="search-panel" id="searchPanel">
        <div class="search-head"><div class="input-wrap">⌕<input id="textSearch" type="search" placeholder="Pesquisar palavra ou expressão..."></div></div>
        <div class="results" id="results"></div>
      </div>
    </section>

    <footer class="toolbar">
      <button class="tool" id="firstButton" title="Primeira página">⏮</button>
      <button class="tool" id="previousButton" title="Página anterior">←</button>
      <div class="counter" id="counter">0 / 0</div>
      <button class="tool" id="nextButton" title="Próxima página">→</button>
      <button class="tool" id="lastButton" title="Última página">⏭</button>
      <button class="tool" id="zoomOutButton" title="Reduzir zoom">−</button>
      <div class="zoom-label" id="zoomLabel">100%</div>
      <button class="tool" id="zoomInButton" title="Ampliar zoom">＋</button>
      <button class="tool" id="fitButton" title="Ajustar à tela">Ajustar</button>
    </footer>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
<script>
(()=>{"use strict";
const OWNER="darielsantos-crypto",REPO="visualizadordepdf",BRANCH="main",FOLDER="pdf";
const $=id=>document.getElementById(id);
const E={app:$("app"),sidebar:$("sidebar"),overlay:$("overlay"),menuButton:$("menuButton"),docFilter:$("docFilter"),docList:$("docList"),title:$("title"),subtitle:$("subtitle"),bookMode:$("bookMode"),documentMode:$("documentMode"),searchButton:$("searchButton"),downloadButton:$("downloadButton"),fullscreenButton:$("fullscreenButton"),stage:$("stage"),bookScale:$("bookScale"),book:$("book"),docView:$("docView"),loader:$("loader"),loaderText:$("loaderText"),error:$("error"),errorText:$("errorText"),searchPanel:$("searchPanel"),textSearch:$("textSearch"),results:$("results"),firstButton:$("firstButton"),previousButton:$("previousButton"),counter:$("counter"),nextButton:$("nextButton"),lastButton:$("lastButton"),zoomOutButton:$("zoomOutButton"),zoomLabel:$("zoomLabel"),zoomInButton:$("zoomInButton"),fitButton:$("fitButton")};
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
let docs=[],active=null,pdf=null,flip=null,pageImages=[],pageTexts=[],total=0,current=0,ratio=1.4142,zoom=1,viewMode="book",loadToken=0,menuOpen=innerWidth>900,resizeTimer=null;
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
const clean=n=>decodeURIComponent(n).replace(/\.pdf$/i,"").replace(/[_-]+/g," ").replace(/\s+/g," ").trim();
function setLoading(msg){E.loaderText.textContent=msg;E.loader.classList.remove("hide");E.error.classList.remove("show")}
function hideLoading(){E.loader.classList.add("hide")}
function fail(msg){E.errorText.textContent=msg;E.error.classList.add("show");hideLoading()}
async function listDocs(){const url=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}?ref=${BRANCH}`;const r=await fetch(url,{headers:{Accept:"application/vnd.github+json"},cache:"no-store"});if(!r.ok)throw Error("Não foi possível consultar a pasta /pdf.");const items=await r.json();docs=items.filter(x=>x.type==="file"&&/\.pdf$/i.test(x.name)).map(x=>({name:x.name,title:clean(x.name),url:`${FOLDER}/${encodeURIComponent(x.name)}`})).sort((a,b)=>a.title.localeCompare(b.title,"pt-BR"));if(!docs.length)throw Error("Nenhum PDF foi encontrado na pasta /pdf.")}
function renderMenu(q=""){q=q.trim().toLowerCase();E.docList.innerHTML="";docs.filter(d=>!q||d.title.toLowerCase().includes(q)).forEach(d=>{const b=document.createElement("button");b.className="doc-item"+(active&&active.name===d.name?" active":"");b.innerHTML=`<span class="doc-icon">PDF</span><span class="doc-name">${esc(d.title)}</span><span class="doc-arrow">›</span>`;b.onclick=()=>openDoc(d);E.docList.appendChild(b)});if(!E.docList.children.length)E.docList.innerHTML='<div style="padding:18px 10px;font-size:13px;opacity:.7">Nenhum documento encontrado.</div>'}
function setMenu(open){menuOpen=open;if(innerWidth<=900){E.sidebar.classList.toggle("open",open);E.overlay.classList.toggle("show",open)}else{E.app.classList.toggle("menu-closed",!open)}setTimeout(()=>rebuildBookKeepingPage(),250)}
function safeScale(v){return Math.min(1.55,Math.sqrt(7000000/(v.width*v.height)))}
function bookSize(){const w=E.stage.clientWidth-24,h=E.stage.clientHeight-24,portrait=w<760;let ph=Math.max(300,h),pw=ph/ratio;if((portrait?pw:pw*2)>w){pw=w/(portrait?1:2);ph=pw*ratio}return{w:Math.max(210,Math.floor(pw)),h:Math.max(290,Math.floor(ph))}}
function destroyFlip(){try{flip&&flip.destroy()}catch{}flip=null;E.book.replaceChildren()}
function buildBook(){destroyFlip();if(!pageImages.length)return;const frag=document.createDocumentFragment();pageImages.forEach((src,i)=>{const p=document.createElement("div");p.className="page";p.dataset.density=(i===0||i===pageImages.length-1)?"hard":"soft";const img=document.createElement("img");img.src=src;img.alt=`Página ${i+1}`;p.appendChild(img);frag.appendChild(p)});E.book.appendChild(frag);const s=bookSize();flip=new St.PageFlip(E.book,{width:s.w,height:s.h,size:"fixed",showCover:true,usePortrait:true,mobileScrollSupport:false,maxShadowOpacity:.38,flippingTime:680,drawShadow:true,autoSize:false,useMouseEvents:true,swipeDistance:20,showPageCorners:true});flip.loadFromHTML(E.book.querySelectorAll(".page"));total=flip.getPageCount();flip.on("flip",ev=>{current=ev.data;updateCounter()});flip.turnToPage(Math.min(current,total-1));updateCounter()}
function rebuildBookKeepingPage(){if(viewMode!=="book"||!pageImages.length)return;const keep=current;buildBook();current=Math.min(keep,total-1);flip&&flip.turnToPage(current);updateCounter()}
function buildDocumentView(){E.docView.replaceChildren();pageImages.forEach((src,i)=>{const img=document.createElement("img");img.className="doc-page";img.src=src;img.alt=`Página ${i+1}`;img.dataset.page=i;E.docView.appendChild(img)});updateDocumentWidths();requestAnimationFrame(()=>goToPage(current,false))}
function updateDocumentWidths(){if(viewMode!=="document")return;const base=Math.min(900,Math.max(260,E.stage.clientWidth-36));E.docView.querySelectorAll(".doc-page").forEach(img=>img.style.width=`${Math.round(base*zoom)}px`)}
function updateZoom(){document.documentElement.style.setProperty("--zoom",zoom);E.zoomLabel.textContent=Math.round(zoom*100)+"%";updateDocumentWidths()}
function setZoom(v){zoom=Math.max(.7,Math.min(1.8,v));updateZoom()}
function fit(){setZoom(1);if(viewMode==="book")rebuildBookKeepingPage()}
function setView(mode){if(mode===viewMode)return;viewMode=mode;E.bookMode.classList.toggle("active",mode==="book");E.documentMode.classList.toggle("active",mode==="document");E.stage.classList.toggle("document-mode",mode==="document");if(mode==="book"){buildBook()}else{destroyFlip();buildDocumentView()}updateCounter()}
function updateCounter(){E.counter.textContent=`${total?current+1:0} / ${total}`;E.firstButton.disabled=current<=0;E.previousButton.disabled=current<=0;E.nextButton.disabled=!total||current>=total-1;E.lastButton.disabled=!total||current>=total-1}
function goToPage(index,smooth=true){current=Math.max(0,Math.min(total-1,index));if(viewMode==="book"){flip&&flip.turnToPage(current)}else{const el=E.docView.querySelector(`[data-page="${current}"]`);el&&el.scrollIntoView({behavior:smooth?"smooth":"auto",block:"start"})}updateCounter()}
function syncDocumentCurrent(){if(viewMode!=="document")return;const top=E.stage.getBoundingClientRect().top+20;let best=0,dist=Infinity;E.docView.querySelectorAll(".doc-page").forEach((el,i)=>{const d=Math.abs(el.getBoundingClientRect().top-top);if(d<dist){dist=d;best=i}});if(best!==current){current=best;updateCounter()}}
async function renderPdf(doc,token){const first=await doc.getPage(1),v0=first.getViewport({scale:1});ratio=v0.height/v0.width;const images=[],texts=[];for(let n=1;n<=doc.numPages;n++){if(token!==loadToken)return;setLoading(`Preparando página ${n} de ${doc.numPages}...`);const p=n===1?first:await doc.getPage(n),base=p.getViewport({scale:1}),v=p.getViewport({scale:safeScale(base)}),c=document.createElement("canvas"),ctx=c.getContext("2d",{alpha:false});c.width=Math.floor(v.width);c.height=Math.floor(v.height);ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);await p.render({canvasContext:ctx,viewport:v,background:"#fff"}).promise;images.push(c.toDataURL("image/jpeg",.93));try{const tc=await p.getTextContent();texts.push(tc.items.map(x=>x.str).join(" "))}catch{texts.push("")}if(n%2===0)await new Promise(r=>requestAnimationFrame(r))}if(token!==loadToken)return;pageImages=images;pageTexts=texts}
async function openDoc(d){const token=++loadToken;active=d;current=0;renderMenu(E.docFilter.value);setMenu(false);history.replaceState(null,"",`${location.pathname}?documento=${encodeURIComponent(d.name)}`);E.title.textContent=d.title;E.subtitle.textContent="";E.searchPanel.classList.remove("open");destroyFlip();E.docView.replaceChildren();pageImages=[];pageTexts=[];total=0;updateCounter();setZoom(1);setLoading("Abrindo documento...");try{const task=pdfjsLib.getDocument({url:d.url,cMapPacked:true,disableAutoFetch:false,disableStream:false});pdf=await task.promise;if(token!==loadToken)return;total=pdf.numPages;await renderPdf(pdf,token);if(token!==loadToken)return;if(viewMode==="book")buildBook();else buildDocumentView();hideLoading()}catch(err){console.error(err);fail("O arquivo foi localizado, mas não pôde ser aberto.")}}
function search(q){q=q.trim().toLowerCase();E.results.innerHTML="";if(q.length<2){E.results.innerHTML='<div style="padding:14px;font-size:13px;color:#657786">Digite pelo menos duas letras.</div>';return}let hits=0;pageTexts.forEach((text,i)=>{const low=text.toLowerCase(),pos=low.indexOf(q);if(pos<0)return;hits++;const ex=text.slice(Math.max(0,pos-55),Math.min(text.length,pos+q.length+90)).replace(/\s+/g," ");const b=document.createElement("button");b.className="result";b.innerHTML=`<b>Página ${i+1}</b><span>...${esc(ex)}...</span>`;b.onclick=()=>{goToPage(i);E.searchPanel.classList.remove("open")};E.results.appendChild(b)});if(!hits)E.results.innerHTML='<div style="padding:14px;font-size:13px;color:#657786">Nenhuma ocorrência encontrada.</div>'}
E.menuButton.onclick=()=>setMenu(!menuOpen);E.overlay.onclick=()=>setMenu(false);E.docFilter.oninput=e=>renderMenu(e.target.value);E.bookMode.onclick=()=>setView("book");E.documentMode.onclick=()=>setView("document");E.searchButton.onclick=()=>{E.searchPanel.classList.toggle("open");if(E.searchPanel.classList.contains("open"))setTimeout(()=>E.textSearch.focus(),30)};E.textSearch.oninput=e=>{clearTimeout(E.textSearch._t);E.textSearch._t=setTimeout(()=>search(e.target.value),180)};E.downloadButton.onclick=()=>{if(!active)return;const a=document.createElement("a");a.href=active.url;a.download=active.name;a.click()};E.fullscreenButton.onclick=async()=>{try{document.fullscreenElement?await document.exitFullscreen():await document.documentElement.requestFullscreen()}catch{}};E.firstButton.onclick=()=>goToPage(0);E.previousButton.onclick=()=>goToPage(current-1);E.nextButton.onclick=()=>goToPage(current+1);E.lastButton.onclick=()=>goToPage(total-1);E.zoomOutButton.onclick=()=>setZoom(zoom-.1);E.zoomInButton.onclick=()=>setZoom(zoom+.1);E.fitButton.onclick=fit;E.stage.addEventListener("scroll",()=>{clearTimeout(E.stage._st);E.stage._st=setTimeout(syncDocumentCurrent,70)});document.addEventListener("keydown",e=>{if(e.key==="Escape"){E.searchPanel.classList.remove("open");if(innerWidth<=900)setMenu(false)}if(document.activeElement?.tagName==="INPUT")return;if(e.key==="ArrowLeft")goToPage(current-1);if(e.key==="ArrowRight")goToPage(current+1);if(e.key==="Home")goToPage(0);if(e.key==="End")goToPage(total-1);if(e.key==="+")setZoom(zoom+.1);if(e.key==="-")setZoom(zoom-.1)});window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{if(innerWidth<=900&&menuOpen)setMenu(false);if(viewMode==="book")rebuildBookKeepingPage();else updateDocumentWidths()},180)});
(async()=>{try{setMenu(menuOpen);setLoading("Localizando os documentos...");await listDocs();renderMenu();const q=new URLSearchParams(location.search).get("documento"),d=docs.find(x=>x.name===q)||docs[0];await openDoc(d)}catch(err){console.error(err);fail(err.message||"Não foi possível carregar a biblioteca.")}})();
})();
</script>
</body>
</html>
