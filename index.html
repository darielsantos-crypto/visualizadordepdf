<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#004883">
<title>Biblioteca Corporativa | Lucena</title>
<style>
:root{--blue:#004883;--dark:#00345f;--red:#ef3340;--stage:#505050;--side:330px;--zoom:1}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:var(--blue);color:#fff}button,input{font:inherit}.app{height:100%;display:grid;grid-template-columns:var(--side) 1fr}.side{display:grid;grid-template-rows:auto auto 1fr auto;background:linear-gradient(180deg,#002e54,#004477);border-right:1px solid #ffffff25;z-index:30;overflow:hidden}.brand{display:flex;gap:12px;align-items:center;padding:16px;border-bottom:1px solid #ffffff25}.bar{width:9px;height:42px;border-radius:8px;background:var(--red)}.brand b{display:block;font-size:18px}.brand small{opacity:.7}.filter{padding:12px}.search{display:flex;gap:8px;align-items:center;height:42px;padding:0 12px;border:1px solid #ffffff30;border-radius:11px;background:#ffffff12}.search input{width:100%;border:0;outline:0;background:transparent;color:inherit}.search input::placeholder{color:#ffffffaa}.docs{overflow:auto;padding:4px 10px 18px}.group{margin:14px 6px 7px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.55}.doc{width:100%;display:grid;grid-template-columns:38px 1fr 20px;align-items:center;gap:9px;padding:10px;border:1px solid transparent;border-radius:11px;background:transparent;color:#fff;text-align:left;cursor:pointer}.doc:hover{background:#ffffff12}.doc.active{background:#fff;color:var(--dark);box-shadow:0 8px 20px #0003}.pdficon{height:42px;border-radius:6px;display:grid;place-items:center;background:#ffffff18;font-size:10px;font-weight:bold}.doc.active .pdficon{background:var(--red);color:#fff}.docname{font-size:13px;font-weight:700;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.foot{padding:12px 14px;border-top:1px solid #ffffff22;font-size:11px;opacity:.6}.viewer{min-width:0;display:grid;grid-template-rows:58px 1fr auto;background:var(--stage)}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;background:var(--blue)}.left,.right{display:flex;align-items:center;gap:8px;min-width:0}.title{min-width:0}.title b{display:block;max-width:46vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}.title small{opacity:.65}.tool{height:40px;min-width:40px;padding:0 12px;border:1px solid #ffffff30;border-radius:10px;background:#ffffff12;color:#fff;cursor:pointer}.tool:hover{background:#ffffff20}.tool:disabled{opacity:.35}.menu{display:none}.stage{position:relative;min-height:0;overflow:auto;display:flex;align-items:center;justify-content:center;padding:14px;background:radial-gradient(circle,#ffffff13,transparent 48%),var(--stage)}.zoom{transform:scale(var(--zoom));transform-origin:center;transition:.15s}#book{filter:drop-shadow(0 25px 32px #0008)}.page{background:#fff;overflow:hidden}.page canvas{width:100%;height:100%;display:block;background:#fff}.loader{position:absolute;inset:0;z-index:50;display:grid;place-items:center;background:var(--stage);transition:.2s}.loader.hide{opacity:0;visibility:hidden;pointer-events:none}.load{text-align:center}.spin{width:48px;height:48px;margin:0 auto 15px;border:4px solid #ffffff40;border-top-color:#fff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}.error{display:none;position:absolute;z-index:60;width:min(620px,90vw);padding:24px;border-radius:17px;background:#00345ff8;text-align:center}.error.show{display:block}.bottom{background:var(--blue);border-top:1px solid #ffffff22}.thumbs{display:flex;gap:7px;overflow-x:auto;padding:7px 12px 3px}.thumb{position:relative;flex:0 0 58px;height:72px;padding:0;border:2px solid transparent;border-radius:5px;overflow:hidden;background:#fff;opacity:.68;cursor:pointer}.thumb.active{border-color:var(--red);opacity:1}.thumb canvas{width:100%;height:100%;display:block}.num{position:absolute;right:2px;bottom:2px;padding:2px 5px;border-radius:8px;background:#000b;color:#fff;font-size:9px}.controls{min-height:54px;display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 10px calc(7px + env(safe-area-inset-bottom))}.count{min-width:88px;text-align:center;font-size:12px;font-weight:bold}.zlabel{min-width:46px;text-align:center;font-size:11px;opacity:.75}.panel{display:none;position:absolute;top:70px;right:14px;z-index:80;width:min(390px,calc(100vw - 28px));max-height:70vh;background:#f8fbfd;color:#173044;border-radius:14px;box-shadow:0 25px 70px #0008;overflow:hidden}.panel.open{display:grid;grid-template-rows:auto 1fr}.panelhead{padding:10px;border-bottom:1px solid #d8e1e8}.panelhead .search{border-color:#ccd8e0;background:#fff}.panelhead input{color:#173044}.results{overflow:auto;padding:7px}.result{width:100%;padding:10px;border:0;border-radius:9px;background:transparent;color:#173044;text-align:left;cursor:pointer}.result:hover{background:#e8f2f8}.result b{display:block;color:var(--blue);margin-bottom:4px}.result span{font-size:12px;color:#607383}.overlay{display:none;position:fixed;inset:0;z-index:25;background:#0007}
@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:fixed;inset:0 auto 0 0;width:min(330px,88vw);transform:translateX(-102%);transition:.22s}.side.open{transform:none}.overlay.show{display:block}.menu{display:inline-block}.lbl{display:none}}
@media(max-width:620px){.title small,.thumbs{display:none}.viewer{grid-template-rows:54px 1fr 62px}.stage{padding:5px}.tool{padding:0 9px}.title b{max-width:45vw}}
</style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<main class="app">
<aside class="side" id="side">
 <div class="brand"><div class="bar"></div><div><b>Biblioteca Corporativa</b><small>Lucena Infraestrutura</small></div></div>
 <div class="filter"><div class="search">⌕<input id="filter" type="search" placeholder="Localizar documento..."></div></div>
 <nav class="docs" id="docs"></nav>
 <div class="foot">Lista gerada automaticamente com os PDFs da pasta <b>/pdf</b>.</div>
</aside>
<section class="viewer">
 <header class="top"><div class="left"><button class="tool menu" id="menu">☰</button><div class="title"><b id="title">Biblioteca Corporativa</b><small id="subtitle">Selecione um documento</small></div></div><div class="right"><button class="tool" id="find">⌕ <span class="lbl">Pesquisar</span></button><button class="tool" id="download">⇩ <span class="lbl">Baixar</span></button><button class="tool" id="full">⛶</button></div></header>
 <section class="stage" id="stage"><div class="zoom"><div id="book"></div></div><div class="loader" id="loader"><div class="load"><div class="spin"></div><b id="loadtitle">Preparando a biblioteca</b><p id="loadmsg">Localizando documentos...</p></div></div><div class="error" id="error"><h2>Não foi possível abrir</h2><p id="errmsg"></p></div><div class="panel" id="panel"><div class="panelhead"><div class="search">⌕<input id="textfind" type="search" placeholder="Pesquisar no documento..."></div></div><div class="results" id="results"></div></div></section>
 <footer class="bottom"><div class="thumbs" id="thumbs"></div><div class="controls"><button class="tool" id="first">⏮</button><button class="tool" id="prev">←</button><div class="count" id="count">0 / 0</div><button class="tool" id="next">→</button><button class="tool" id="last">⏭</button><button class="tool" id="zout">−</button><div class="zlabel" id="zlabel">100%</div><button class="tool" id="zin">＋</button><button class="tool" id="sound">🔊</button></div></footer>
</section></main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
(()=>{"use strict";
const OWNER="darielsantos-crypto",REPO="visualizadordepdf",BRANCH="main",FOLDER="pdf";
const $=id=>document.getElementById(id),E={side:$("side"),overlay:$("overlay"),menu:$("menu"),filter:$("filter"),docs:$("docs"),title:$("title"),subtitle:$("subtitle"),stage:$("stage"),book:$("book"),loader:$("loader"),loadmsg:$("loadmsg"),error:$("error"),errmsg:$("errmsg"),find:$("find"),panel:$("panel"),textfind:$("textfind"),results:$("results"),download:$("download"),full:$("full"),thumbs:$("thumbs"),count:$("count"),first:$("first"),prev:$("prev"),next:$("next"),last:$("last"),zout:$("zout"),zin:$("zin"),zlabel:$("zlabel"),sound:$("sound")};
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
let docs=[],active=null,pdf=null,flip=null,total=0,ratio=1.414,zoom=1,sound=true,texts=[],token=0,audio=null;
const esc=s=>s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
const clean=n=>decodeURIComponent(n).replace(/\.pdf$/i,"").replace(/[_-]+/g," ").replace(/\s+/g," ").trim();
const cat=n=>{n=n.toLowerCase();if(n.includes("política")||n.includes("politica"))return"Políticas";if(n.includes("manual"))return"Manuais";if(n.includes("procedimento")||n.includes("pro-"))return"Procedimentos";if(n.includes("código")||n.includes("codigo"))return"Códigos";return"Outros documentos"};
function loading(m){E.loadmsg.textContent=m;E.loader.classList.remove("hide");E.error.classList.remove("show")}function hide(){E.loader.classList.add("hide")}function fail(m){E.errmsg.textContent=m;E.error.classList.add("show");hide()}
async function list(){let u=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}?ref=${BRANCH}`,r=await fetch(u,{headers:{Accept:"application/vnd.github+json"},cache:"no-store"});if(!r.ok)throw Error("Não foi possível consultar a pasta /pdf.");let a=await r.json();docs=a.filter(x=>x.type==="file"&&/\.pdf$/i.test(x.name)).map(x=>({name:x.name,title:clean(x.name),category:cat(x.name),url:x.download_url})).sort((a,b)=>a.title.localeCompare(b.title,"pt-BR"));if(!docs.length)throw Error("Nenhum PDF encontrado na pasta /pdf.")}
function menu(q=""){q=q.toLowerCase().trim();let g=new Map;docs.filter(d=>!q||d.title.toLowerCase().includes(q)).forEach(d=>{if(!g.has(d.category))g.set(d.category,[]);g.get(d.category).push(d)});E.docs.innerHTML="";for(let [c,a] of g){let h=document.createElement("div");h.className="group";h.textContent=c;E.docs.appendChild(h);a.forEach(d=>{let b=document.createElement("button");b.className="doc"+(active&&active.name===d.name?" active":"");b.dataset.name=d.name;b.innerHTML=`<span class="pdficon">PDF</span><span class="docname">${esc(d.title)}</span><span>›</span>`;b.onclick=()=>openDoc(d);E.docs.appendChild(b)})}}
function size(){let w=E.stage.clientWidth,h=E.stage.clientHeight,p=w<820,ph=Math.max(320,h-28),pw=ph/ratio;if((p?pw:pw*2)>w-28){pw=(w-28)/(p?1:2);ph=pw*ratio}return{w:Math.max(220,Math.floor(pw)),h:Math.max(300,Math.floor(ph))}}
function destroy(){try{flip&&flip.destroy()}catch{}flip=null;E.book.replaceChildren();E.thumbs.replaceChildren();texts=[];total=0;counter(0)}
async function render(doc,t){let first=await doc.getPage(1),v0=first.getViewport({scale:1});ratio=v0.height/v0.width;let f=document.createDocumentFragment(),tf=document.createDocumentFragment(),tx=[];for(let n=1;n<=doc.numPages;n++){if(t!==token)return;loading(`Preparando página ${n} de ${doc.numPages}...`);let p=n===1?first:await doc.getPage(n),base=p.getViewport({scale:1}),sc=Math.min(1.72,Math.sqrt(8500000/(base.width*base.height))),v=p.getViewport({scale:sc}),pe=document.createElement("div");pe.className="page";pe.dataset.density=n===1||n===doc.numPages?"hard":"soft";let c=document.createElement("canvas"),cx=c.getContext("2d",{alpha:false});c.width=Math.floor(v.width);c.height=Math.floor(v.height);await p.render({canvasContext:cx,viewport:v,background:"#fff"}).promise;pe.appendChild(c);f.appendChild(pe);let tb=document.createElement("button");tb.className="thumb";tb.dataset.page=n-1;let tc=document.createElement("canvas"),tv=p.getViewport({scale:.20});tc.width=tv.width;tc.height=tv.height;await p.render({canvasContext:tc.getContext("2d"),viewport:tv,background:"#fff"}).promise;tb.appendChild(tc);let ns=document.createElement("span");ns.className="num";ns.textContent=n;tb.appendChild(ns);tb.onclick=()=>flip&&flip.turnToPage(n-1);tf.appendChild(tb);try{let z=await p.getTextContent();tx.push(z.items.map(i=>i.str).join(" "))}catch{tx.push("")}if(n%2===0)await new Promise(r=>requestAnimationFrame(r))}if(t!==token)return;E.book.replaceChildren(f);E.thumbs.replaceChildren(tf);texts=tx}
function init(){let s=size();flip=new St.PageFlip(E.book,{width:s.w,height:s.h,size:"stretch",minWidth:220,maxWidth:s.w,minHeight:300,maxHeight:s.h,showCover:true,usePortrait:true,mobileScrollSupport:false,maxShadowOpacity:.42,flippingTime:760,drawShadow:true,autoSize:true,useMouseEvents:true,swipeDistance:20,showPageCorners:true});flip.loadFromHTML(document.querySelectorAll(".page"));total=flip.getPageCount();flip.on("flip",e=>{counter(e.data);pageSound()});counter(0)}
function counter(i){let p=total?Math.min(total,i+1):0;E.count.textContent=`${p} / ${total}`;E.first.disabled=E.prev.disabled=i<=0;E.next.disabled=E.last.disabled=!total||i>=total-1;document.querySelectorAll(".thumb").forEach(x=>x.classList.toggle("active",+x.dataset.page===i||+x.dataset.page===i+1));document.querySelector(".thumb.active")?.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"})}
async function openDoc(d){let t=++token;active=d;history.replaceState(null,"",`${location.pathname}?documento=${encodeURIComponent(d.name)}`);menu(E.filter.value);E.side.classList.remove("open");E.overlay.classList.remove("show");E.title.textContent=d.title;E.subtitle.textContent=d.category;destroy();setZoom(1);loading("Abrindo documento...");try{let task=pdfjsLib.getDocument({url:d.url,cMapPacked:true});pdf=await task.promise;if(t!==token)return;total=pdf.numPages;await render(pdf,t);if(t!==token)return;loading("Montando o livreto...");init();hide()}catch(e){console.error(e);fail("O arquivo foi localizado, mas não pôde ser processado.")}}
function search(q){q=q.trim().toLowerCase();E.results.innerHTML="";if(q.length<2){E.results.innerHTML="<p style='padding:12px'>Digite pelo menos duas letras.</p>";return}let found=0;texts.forEach((t,i)=>{let l=t.toLowerCase(),p=l.indexOf(q);if(p<0)return;found++;let ex=t.slice(Math.max(0,p-55),Math.min(t.length,p+q.length+90)).replace(/\s+/g," ");let b=document.createElement("button");b.className="result";b.innerHTML=`<b>Página ${i+1}</b><span>...${esc(ex)}...</span>`;b.onclick=()=>{flip.turnToPage(i);E.panel.classList.remove("open")};E.results.appendChild(b)});if(!found)E.results.innerHTML="<p style='padding:12px'>Nenhuma ocorrência encontrada.</p>"}
function setZoom(v){zoom=Math.max(.7,Math.min(2,v));document.documentElement.style.setProperty("--zoom",zoom);E.zlabel.textContent=Math.round(zoom*100)+"%"}
function pageSound(){if(!sound)return;try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();let dur=.16,b=audio.createBuffer(1,audio.sampleRate*dur,audio.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.12;let s=audio.createBufferSource(),f=audio.createBiquadFilter(),g=audio.createGain();f.type="bandpass";f.frequency.value=1300;g.gain.value=.5;s.buffer=b;s.connect(f);f.connect(g);g.connect(audio.destination);s.start()}catch{}}
E.menu.onclick=()=>{E.side.classList.add("open");E.overlay.classList.add("show")};E.overlay.onclick=()=>{E.side.classList.remove("open");E.overlay.classList.remove("show")};E.filter.oninput=e=>menu(e.target.value);E.find.onclick=()=>{E.panel.classList.toggle("open");setTimeout(()=>E.textfind.focus(),50)};E.textfind.oninput=e=>{clearTimeout(E.textfind.tm);E.textfind.tm=setTimeout(()=>search(e.target.value),220)};E.download.onclick=()=>{if(!active)return;let a=document.createElement("a");a.href=active.url;a.download=active.name;a.target="_blank";a.click()};E.full.onclick=async()=>{try{document.fullscreenElement?await document.exitFullscreen():await document.documentElement.requestFullscreen()}catch{}};E.first.onclick=()=>flip&&flip.turnToPage(0);E.prev.onclick=()=>flip&&flip.flipPrev();E.next.onclick=()=>flip&&flip.flipNext();E.last.onclick=()=>flip&&flip.turnToPage(total-1);E.zout.onclick=()=>setZoom(zoom-.1);E.zin.onclick=()=>setZoom(zoom+.1);E.sound.onclick=()=>{sound=!sound;E.sound.textContent=sound?"🔊":"🔇"};document.onkeydown=e=>{if(e.key==="Escape"){E.panel.classList.remove("open");E.side.classList.remove("open");E.overlay.classList.remove("show")}if(!flip||document.activeElement?.tagName==="INPUT")return;if(e.key==="ArrowLeft")flip.flipPrev();if(e.key==="ArrowRight")flip.flipNext();if(e.key==="Home")flip.turnToPage(0);if(e.key==="End")flip.turnToPage(total-1);if(e.key==="+")setZoom(zoom+.1);if(e.key==="-")setZoom(zoom-.1)};
(async()=>{try{loading("Consultando a pasta /pdf...");await list();menu();let q=new URLSearchParams(location.search).get("documento"),d=docs.find(x=>x.name===q)||docs[0];await openDoc(d)}catch(e){console.error(e);fail(e.message)}})();
})();
</script>
</body></html>
