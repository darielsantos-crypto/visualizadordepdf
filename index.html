<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#004883">
<title>Biblioteca Corporativa | Lucena Infraestrutura</title>
<style>
:root{
  --blue:#004883; --blue-dark:#00345f; --red:#ef3340; --stage:#575757;
  --sidebar:300px; --zoom:1; --pageW:420px;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:var(--blue);color:#fff}
button,input{font:inherit} button{border:0}
.app{width:100%;height:100%;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr);transition:grid-template-columns .22s ease}
.app.menu-closed{grid-template-columns:0 minmax(0,1fr)}
.sidebar{min-width:0;overflow:hidden;background:linear-gradient(180deg,#002f56,#004883);border-right:1px solid #ffffff22;display:grid;grid-template-rows:auto auto minmax(0,1fr);z-index:40}
.sidebar-inner{width:var(--sidebar);min-width:var(--sidebar);display:contents}
.brand{height:64px;display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid #ffffff20}
.brand-line{width:8px;height:38px;border-radius:8px;background:var(--red);flex:0 0 auto}
.brand strong{display:block;font-size:17px;line-height:1.05}.brand small{display:block;margin-top:4px;font-size:11px;opacity:.72}
.doc-filter{padding:12px}
.input-wrap{height:40px;display:flex;align-items:center;gap:8px;padding:0 11px;border:1px solid #ffffff2d;border-radius:10px;background:#ffffff10}
.input-wrap input{min-width:0;width:100%;border:0;outline:0;color:#fff;background:transparent;user-select:text}
.input-wrap input::placeholder{color:#ffffffa0}
.doc-list{overflow:auto;padding:0 10px 14px;scrollbar-width:thin;scrollbar-color:#ffffff45 transparent}
.doc-item{width:100%;display:grid;grid-template-columns:34px minmax(0,1fr) 18px;gap:9px;align-items:center;padding:10px;border:1px solid transparent;border-radius:11px;background:transparent;color:#fff;text-align:left;cursor:pointer;margin-bottom:5px}
.doc-item:hover{background:#ffffff11}.doc-item.active{background:#fff;color:var(--blue-dark);box-shadow:0 8px 22px #0003}
.doc-icon{height:40px;border-radius:6px;display:grid;place-items:center;background:#ffffff18;font-size:9px;font-weight:800}.doc-item.active .doc-icon{background:var(--red);color:#fff}
.doc-name{font-size:13px;font-weight:700;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.doc-arrow{opacity:.45;font-size:18px}

.viewer{min-width:0;min-height:0;display:grid;grid-template-rows:56px minmax(0,1fr) 56px;background:var(--stage)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 10px;background:var(--blue);border-bottom:1px solid #ffffff1f;z-index:30}
.top-left,.top-right{display:flex;align-items:center;gap:7px;min-width:0}
.tool{height:40px;min-width:40px;padding:0 11px;border:1px solid #ffffff2b;border-radius:10px;background:#ffffff10;color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.tool:hover{background:#ffffff1d}.tool:disabled{opacity:.32;cursor:not-allowed}
.title{min-width:0}.title strong{display:block;max-width:min(47vw,700px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}.title small{display:block;margin-top:3px;font-size:10px;opacity:.65}
.mode{display:flex;height:40px;padding:3px;border:1px solid #ffffff2b;border-radius:10px;background:#0002}
.mode button{height:32px;padding:0 10px;border-radius:7px;background:transparent;color:#ffffffb8;cursor:pointer;font-size:12px;font-weight:700}
.mode button.active{background:#fff;color:var(--blue-dark)}

.stage{position:relative;min-width:0;min-height:0;overflow:auto;background:radial-gradient(circle at center,#ffffff11,transparent 50%),var(--stage);display:flex;align-items:center;justify-content:center;padding:12px}
.stage.document-mode{align-items:flex-start;justify-content:center;padding:18px 12px}

.book-view{display:flex;align-items:center;justify-content:center;width:100%;height:100%;transform:scale(var(--zoom));transform-origin:center center;transition:transform .14s ease}
.spread-shell{position:relative;display:flex;align-items:stretch;justify-content:center;gap:8px;perspective:1800px}
.page-card{position:relative;background:#fff;box-shadow:0 14px 34px #0007;overflow:hidden;width:var(--pageW);height:calc(var(--pageW) * 1.4142);flex:0 0 auto}
.page-card.blank{background:transparent;box-shadow:none}
.page-face{position:relative;width:100%;height:100%;background:#fff}
.page-card.flip-next{transform-origin:left center;animation:flipNext .55s ease}
.page-card.flip-prev{transform-origin:right center;animation:flipPrev .55s ease}
@keyframes flipNext{0%{transform:rotateY(0deg)}100%{transform:rotateY(-95deg);opacity:.25}}
@keyframes flipPrev{0%{transform:rotateY(0deg)}100%{transform:rotateY(95deg);opacity:.25}}

.doc-view{display:none;width:100%;flex-direction:column;align-items:center;gap:18px;padding-bottom:20px}
.stage.document-mode .doc-view{display:flex}
.stage.document-mode .book-view{display:none}
.doc-page{display:block;background:#fff;box-shadow:0 14px 34px #0007;max-width:none;height:auto;position:relative}
.page-inner{position:relative;background:#fff;width:100%;height:100%}
.page-canvas{display:block;width:100%;height:auto;background:#fff}
.page-card .page-canvas{width:100%;height:100%;object-fit:fill}

.textLayer{position:absolute;inset:0;overflow:hidden;line-height:1;opacity:.96}
.textLayer span, .textLayer br{color:transparent;position:absolute;white-space:pre;transform-origin:0 0;cursor:text}
.textLayer ::selection{background:rgba(0,72,131,.24)}

.loader{position:absolute;inset:0;z-index:60;display:grid;place-items:center;background:var(--stage);transition:.2s}
.loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.load{text-align:center;padding:20px}
.spinner{width:46px;height:46px;margin:0 auto 15px;border:4px solid #ffffff3b;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load b{display:block;font-size:17px}.load span{display:block;margin-top:7px;font-size:12px;opacity:.75}
.error{display:none;position:absolute;z-index:70;width:min(560px,90vw);padding:23px;border-radius:16px;background:#00345ff7;box-shadow:0 24px 60px #0007;text-align:center}
.error.show{display:block}.error h2{margin:0 0 10px;font-size:20px}.error p{margin:0;font-size:13px;line-height:1.45}

.search-panel{display:none;position:absolute;top:66px;right:12px;z-index:80;width:min(390px,calc(100vw - 24px));max-height:72vh;background:#f7fafc;color:#173044;border-radius:14px;box-shadow:0 24px 65px #0009;overflow:hidden}
.search-panel.open{display:grid;grid-template-rows:auto minmax(0,1fr)}
.search-head{padding:10px;border-bottom:1px solid #d6e0e7}.search-head .input-wrap{border-color:#c9d6df;background:#fff}.search-head input{color:#173044}.search-head input::placeholder{color:#748594}
.results{overflow:auto;padding:7px}.result{width:100%;padding:10px;border-radius:9px;background:transparent;color:#173044;text-align:left;cursor:pointer}.result:hover{background:#e7f1f7}.result b{display:block;color:var(--blue);margin-bottom:4px}.result span{font-size:12px;line-height:1.35;color:#586b7b}

.toolbar{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px calc(7px + env(safe-area-inset-bottom));background:var(--blue);border-top:1px solid #ffffff20}
.counter{min-width:88px;text-align:center;font-size:12px;font-weight:800}
.zoom-label{min-width:46px;text-align:center;font-size:11px;opacity:.72}
.overlay{display:none;position:fixed;inset:0;background:#0008;z-index:35}

@media(max-width:900px){
  :root{--sidebar:min(310px,88vw)}
  .app,.app.menu-closed{grid-template-columns:1fr}
  .sidebar{position:fixed;inset:0 auto 0 0;width:var(--sidebar);transform:translateX(-102%);transition:transform .22s ease;box-shadow:18px 0 40px #0005}
  .sidebar.open{transform:translateX(0)}.overlay.show{display:block}
  .title strong{max-width:40vw}.label{display:none}
}
@media(max-width:620px){
  .viewer{grid-template-rows:52px minmax(0,1fr) 56px}.topbar{padding:6px}.title small{display:none}.title strong{max-width:35vw}
  .mode button{padding:0 8px;font-size:11px}.tool{padding:0 9px}.stage{padding:5px}.stage.document-mode{padding:10px 5px}
  .toolbar .tool:nth-of-type(1),.toolbar .tool:nth-of-type(5){display:none}
}
</style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<main class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="brand"><div class="brand-line"></div><div><strong>Biblioteca Corporativa</strong><small>Lucena Infraestrutura</small></div></div>
      <div class="doc-filter"><div class="input-wrap">⌕<input id="docFilter" type="search" placeholder="Localizar documento..."></div></div>
      <nav class="doc-list" id="docList"></nav>
    </div>
  </aside>

  <section class="viewer">
    <header class="topbar">
      <div class="top-left">
        <button class="tool" id="menuButton" title="Abrir ou fechar documentos">☰</button>
        <div class="title"><strong id="title">Biblioteca Corporativa</strong><small id="subtitle"></small></div>
      </div>
      <div class="top-right">
        <div class="mode" aria-label="Modo de visualização">
          <button id="bookMode" class="active">Livreto</button>
          <button id="documentMode">Documento</button>
        </div>
        <button class="tool" id="searchButton" title="Pesquisar no documento">⌕ <span class="label">Pesquisar</span></button>
        <button class="tool" id="downloadButton" title="Baixar PDF">⇩ <span class="label">Baixar</span></button>
        <button class="tool" id="fullscreenButton" title="Tela cheia">⛶</button>
      </div>
    </header>

    <section class="stage" id="stage">
      <div class="book-view" id="bookView">
        <div class="spread-shell" id="spreadShell"></div>
      </div>
      <div class="doc-view" id="docView"></div>

      <div class="loader" id="loader"><div class="load"><div class="spinner"></div><b>Carregando documento</b><span id="loaderText">Localizando os PDFs...</span></div></div>
      <div class="error" id="error"><h2>Não foi possível abrir</h2><p id="errorText"></p></div>

      <div class="search-panel" id="searchPanel">
        <div class="search-head"><div class="input-wrap">⌕<input id="textSearch" type="search" placeholder="Pesquisar palavra ou expressão..."></div></div>
        <div class="results" id="results"></div>
      </div>
    </section>

    <footer class="toolbar">
      <button class="tool" id="firstButton" title="Primeira página">⏮</button>
      <button class="tool" id="previousButton" title="Página anterior">←</button>
      <div class="counter" id="counter">0 / 0</div>
      <button class="tool" id="nextButton" title="Próxima página">→</button>
      <button class="tool" id="lastButton" title="Última página">⏭</button>
      <button class="tool" id="zoomOutButton" title="Reduzir zoom">−</button>
      <div class="zoom-label" id="zoomLabel">100%</div>
      <button class="tool" id="zoomInButton" title="Ampliar zoom">＋</button>
      <button class="tool" id="fitButton" title="Ajustar à tela">Ajustar</button>
    </footer>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(()=>{"use strict";
const OWNER="darielsantos-crypto", REPO="visualizadordepdf", BRANCH="main", FOLDER="pdf";
const $=id=>document.getElementById(id);
const E={app:$("app"),sidebar:$("sidebar"),overlay:$("overlay"),menuButton:$("menuButton"),docFilter:$("docFilter"),docList:$("docList"),title:$("title"),subtitle:$("subtitle"),bookMode:$("bookMode"),documentMode:$("documentMode"),searchButton:$("searchButton"),downloadButton:$("downloadButton"),fullscreenButton:$("fullscreenButton"),stage:$("stage"),bookView:$("bookView"),spreadShell:$("spreadShell"),docView:$("docView"),loader:$("loader"),loaderText:$("loaderText"),error:$("error"),errorText:$("errorText"),searchPanel:$("searchPanel"),textSearch:$("textSearch"),results:$("results"),firstButton:$("firstButton"),previousButton:$("previousButton"),counter:$("counter"),nextButton:$("nextButton"),lastButton:$("lastButton"),zoomOutButton:$("zoomOutButton"),zoomLabel:$("zoomLabel"),zoomInButton:$("zoomInButton"),fitButton:$("fitButton")};
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let docs=[], active=null, pdf=null, total=0, pageRatio=1.4142, zoom=1, viewMode="book", loadToken=0, menuOpen=innerWidth>900, currentPage=0;
let pageCache=[], pageTexts=[];

const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
const clean=n=>decodeURIComponent(n).replace(/\.pdf$/i,"").replace(/[_-]+/g," ").replace(/\s+/g," ").trim();

function setLoading(msg){E.loaderText.textContent=msg;E.loader.classList.remove("hide");E.error.classList.remove("show")}
function hideLoading(){E.loader.classList.add("hide")}
function fail(msg){E.errorText.textContent=msg;E.error.classList.add("show");hideLoading()}
function setMenu(open){menuOpen=open;if(innerWidth<=900){E.sidebar.classList.toggle("open",open);E.overlay.classList.toggle("show",open)}else{E.app.classList.toggle("menu-closed",!open)} setTimeout(updatePageWidth,220)}
function currentParam(){return new URLSearchParams(location.search).get("documento")}
function pushParam(name){const u=new URL(location.href);u.searchParams.set("documento",name);history.replaceState(null,"",u)}
function updateZoom(){document.documentElement.style.setProperty("--zoom",zoom);E.zoomLabel.textContent=Math.round(zoom*100)+"%";updatePageWidth()}
function setZoom(v){zoom=Math.max(.7,Math.min(1.8,v));updateZoom()}
function fit(){setZoom(1)}
function updateCounter(){E.counter.textContent=`${total?currentPage+1:0} / ${total}`;E.firstButton.disabled=currentPage<=0;E.previousButton.disabled=currentPage<=0;E.nextButton.disabled=!total||currentPage>=total-1;E.lastButton.disabled=!total||currentPage>=total-1}
function renderMenu(q=""){q=q.trim().toLowerCase();E.docList.innerHTML="";docs.filter(d=>!q||d.title.toLowerCase().includes(q)).forEach(d=>{const b=document.createElement("button");b.className="doc-item"+(active&&active.name===d.name?" active":"");b.innerHTML=`<span class="doc-icon">PDF</span><span class="doc-name">${esc(d.title)}</span><span class="doc-arrow">›</span>`;b.onclick=()=>openDoc(d);E.docList.appendChild(b)});if(!E.docList.children.length)E.docList.innerHTML='<div style="padding:18px 10px;font-size:13px;opacity:.7">Nenhum documento encontrado.</div>'}
function setView(mode){if(mode===viewMode)return;viewMode=mode;E.bookMode.classList.toggle("active",mode==="book");E.documentMode.classList.toggle("active",mode==="document");E.stage.classList.toggle("document-mode",mode==="document"); if(mode==="book"){renderCurrentSpread()}else{renderDocumentMode()} updateCounter()}

async function listDocs(){
  const url=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}?ref=${BRANCH}`;
  const r=await fetch(url,{headers:{Accept:"application/vnd.github+json"},cache:"no-store"});
  if(!r.ok) throw Error("Não foi possível consultar a pasta /pdf.");
  const items=await r.json();
  docs=items.filter(x=>x.type==="file"&&/\.pdf$/i.test(x.name)).map(x=>({name:x.name,title:clean(x.name),url:`${FOLDER}/${encodeURIComponent(x.name)}`})).sort((a,b)=>a.title.localeCompare(b.title,"pt-BR"));
  if(!docs.length) throw Error("Nenhum PDF foi encontrado na pasta /pdf.");
}

function spreadInfo(pageIndex){
  if(pageIndex<=0) return {left:null,right:0};
  const pairBase = pageIndex%2===0 ? pageIndex : pageIndex-1;
  return {left:pairBase, right:(pairBase+1<total?pairBase+1:null)};
}
function firstPageOfSpread(pageIndex){
  if(pageIndex<=0) return 0;
  return pageIndex%2===0 ? pageIndex : pageIndex-1;
}

function updatePageWidth(){
  const area = viewMode==="book" ? E.bookView.clientWidth : E.stage.clientWidth;
  const h = viewMode==="book" ? E.bookView.clientHeight : E.stage.clientHeight;
  const availW = Math.max(280, area - 40);
  const availH = Math.max(320, h - 30);
  let pageW = viewMode==="book" ? Math.min(availW/2 - 8, availH / pageRatio) : Math.min(900*zoom, availW);
  if(viewMode==="book") pageW = pageW * zoom;
  document.documentElement.style.setProperty("--pageW", `${Math.round(pageW)}px`);
  if(viewMode==="document"){
    E.docView.querySelectorAll(".doc-page").forEach(el=>{el.style.width=`${Math.round(Math.min(900,availW)*zoom)}px`});
  }
}

async function ensurePageData(index){
  if(index===null || index<0 || index>=total) return null;
  if(pageCache[index]) return pageCache[index];

  const page = await pdf.getPage(index+1);
  const base = page.getViewport({scale:1});
  pageRatio = base.height/base.width;

  const renderScale = Math.min(1.6, Math.sqrt(7200000/(base.width*base.height)));
  const vp = page.getViewport({scale:renderScale});
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d",{alpha:false});
  canvas.width=Math.floor(vp.width); canvas.height=Math.floor(vp.height);
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
  await page.render({canvasContext:ctx,viewport:vp,background:"#fff"}).promise;

  const textContent = await page.getTextContent().catch(()=>({items:[]}));
  pageTexts[index]=(textContent.items||[]).map(x=>x.str).join(" ");

  pageCache[index]={dataUrl:canvas.toDataURL("image/png"), width:vp.width, height:vp.height, textContent};
  return pageCache[index];
}

async function buildPageElement(index){
  if(index===null || index<0 || index>=total){
    const blank=document.createElement("div"); blank.className="page-card blank"; return blank;
  }
  const data = await ensurePageData(index);
  const wrap = document.createElement("div");
  wrap.className="page-card";
  const face = document.createElement("div");
  face.className="page-face";
  const inner = document.createElement("div");
  inner.className="page-inner";
  const img = document.createElement("img");
  img.className="page-canvas";
  img.src=data.dataUrl;
  img.alt=`Página ${index+1}`;
  const textLayer = document.createElement("div");
  textLayer.className="textLayer";
  inner.append(img,textLayer);
  face.append(inner);
  wrap.append(face);

  requestAnimationFrame(async()=>{
    const targetW = wrap.clientWidth || parseFloat(getComputedStyle(wrap).width);
    const scale = targetW / data.width;
    const viewport = new pdfjsLib.PageViewport({viewBox:[0,0,data.width,data.height], scale, rotation:0, offsetX:0, offsetY:0, dontFlip:false});
    try{
      await pdfjsLib.renderTextLayer({textContentSource:data.textContent, container:textLayer, viewport, textDivs:[]}).promise;
    }catch{}
  });

  return wrap;
}

async function renderCurrentSpread(animDir=""){
  E.spreadShell.innerHTML="";
  if(!total) return;
  updatePageWidth();
  const {left,right} = spreadInfo(currentPage);
  const leftEl = await buildPageElement(left);
  const rightEl = await buildPageElement(right);
  if(animDir==="next" && rightEl && !rightEl.classList.contains("blank")) rightEl.classList.add("flip-next");
  if(animDir==="prev" && leftEl && !leftEl.classList.contains("blank")) leftEl.classList.add("flip-prev");
  E.spreadShell.append(leftEl,rightEl);
}

async function renderDocumentMode(){
  E.docView.innerHTML="";
  updatePageWidth();
  const availW = Math.min(900, E.stage.clientWidth-36)*zoom;
  for(let i=0;i<total;i++){
    const data = await ensurePageData(i);
    const box = document.createElement("div");
    box.className="doc-page";
    box.dataset.page = i;
    box.style.width=`${Math.round(availW)}px`;

    const inner = document.createElement("div");
    inner.className="page-inner";
    const img = document.createElement("img");
    img.className="page-canvas";
    img.src=data.dataUrl;
    img.alt=`Página ${i+1}`;
    const textLayer = document.createElement("div");
    textLayer.className="textLayer";
    inner.append(img,textLayer);
    box.append(inner);
    E.docView.appendChild(box);

    requestAnimationFrame(async()=>{
      const scale = box.clientWidth / data.width;
      const viewport = new pdfjsLib.PageViewport({viewBox:[0,0,data.width,data.height], scale, rotation:0, offsetX:0, offsetY:0, dontFlip:false});
      try{
        await pdfjsLib.renderTextLayer({textContentSource:data.textContent, container:textLayer, viewport, textDivs:[]}).promise;
      }catch{}
    });
  }
}

function goToPage(index, animate=true){
  if(!total) return;
  const old = currentPage;
  currentPage=Math.max(0,Math.min(total-1,index));
  updateCounter();
  if(viewMode==="book"){
    const dir = animate ? (currentPage>old ? "next" : currentPage<old ? "prev" : "") : "";
    renderCurrentSpread(dir);
  }else{
    const el=E.docView.querySelector(`[data-page="${currentPage}"]`);
    el&&el.scrollIntoView({behavior:animate?"smooth":"auto",block:"start"});
  }
}
function syncDocumentCurrent(){
  if(viewMode!=="document") return;
  const top=E.stage.getBoundingClientRect().top+20;
  let best=0, dist=Infinity;
  E.docView.querySelectorAll(".doc-page").forEach((el,i)=>{const d=Math.abs(el.getBoundingClientRect().top-top); if(d<dist){dist=d; best=i;}});
  if(best!==currentPage){currentPage=best; updateCounter();}
}

async function openDoc(d){
  const token=++loadToken;
  active=d;
  pushParam(d.name);
  renderMenu(E.docFilter.value);
  E.title.textContent=d.title; E.subtitle.textContent="";
  E.searchPanel.classList.remove("open");
  pageCache=[]; pageTexts=[]; total=0; currentPage=0; pdf=null;
  E.docView.innerHTML=""; E.spreadShell.innerHTML="";
  setLoading("Abrindo documento..."); updateCounter();
  try{
    const task=pdfjsLib.getDocument({url:d.url,cMapPacked:true,disableAutoFetch:false,disableStream:false});
    pdf=await task.promise;
    if(token!==loadToken) return;
    total=pdf.numPages;
    await ensurePageData(0);
    if(total>1) await ensurePageData(1);
    if(token!==loadToken) return;
    hideLoading();
    if(viewMode==="book") await renderCurrentSpread();
    else await renderDocumentMode();
    updateCounter();
  }catch(err){
    console.error(err);
    fail("O arquivo foi localizado, mas não pôde ser aberto.");
  }
}

function search(q){
  q=q.trim().toLowerCase(); E.results.innerHTML="";
  if(q.length<2){E.results.innerHTML='<div style="padding:14px;font-size:13px;color:#657786">Digite pelo menos duas letras.</div>'; return;}
  let hits=0;
  pageTexts.forEach((text,i)=>{const low=(text||"").toLowerCase(), pos=low.indexOf(q); if(pos<0) return; hits++;
    const ex=(text||"").slice(Math.max(0,pos-55),Math.min((text||"").length,pos+q.length+90)).replace(/\s+/g," ");
    const b=document.createElement("button"); b.className="result"; b.innerHTML=`<b>Página ${i+1}</b><span>...${esc(ex)}...</span>`;
    b.onclick=()=>{goToPage(i); E.searchPanel.classList.remove("open")}; E.results.appendChild(b);
  });
  if(!hits) E.results.innerHTML='<div style="padding:14px;font-size:13px;color:#657786">Nenhuma ocorrência encontrada.</div>';
}

E.menuButton.onclick=()=>setMenu(!menuOpen);
E.overlay.onclick=()=>setMenu(false);
E.docFilter.oninput=e=>renderMenu(e.target.value);
E.bookMode.onclick=()=>setView("book");
E.documentMode.onclick=()=>setView("document");
E.searchButton.onclick=()=>{E.searchPanel.classList.toggle("open"); if(E.searchPanel.classList.contains("open")) setTimeout(()=>E.textSearch.focus(),30);}
E.textSearch.oninput=e=>{clearTimeout(E.textSearch._t); E.textSearch._t=setTimeout(()=>search(e.target.value),180);}
E.downloadButton.onclick=()=>{if(!active) return; const a=document.createElement("a"); a.href=active.url; a.download=active.name; a.click();}
E.fullscreenButton.onclick=async()=>{try{document.fullscreenElement?await document.exitFullscreen():await document.documentElement.requestFullscreen()}catch{}}
E.firstButton.onclick=()=>goToPage(0);
E.previousButton.onclick=()=>goToPage(viewMode==="book"? (currentPage<=0?0:firstPageOfSpread(currentPage)-2<0?0:firstPageOfSpread(currentPage)-2) : currentPage-1);
E.nextButton.onclick=()=>goToPage(viewMode==="book"? (currentPage<=0?2:firstPageOfSpread(currentPage)+2) : currentPage+1);
E.lastButton.onclick=()=>goToPage(total-1);
E.zoomOutButton.onclick=()=>setZoom(zoom-.1);
E.zoomInButton.onclick=()=>setZoom(zoom+.1);
E.fitButton.onclick=fit;
E.stage.addEventListener("scroll",()=>{clearTimeout(E.stage._st); E.stage._st=setTimeout(syncDocumentCurrent,70);});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){E.searchPanel.classList.remove("open"); if(innerWidth<=900) setMenu(false);}
  if(document.activeElement?.tagName==="INPUT") return;
  if(e.key==="ArrowLeft") E.previousButton.click();
  if(e.key==="ArrowRight") E.nextButton.click();
  if(e.key==="Home") E.firstButton.click();
  if(e.key==="End") E.lastButton.click();
  if(e.key==="+") setZoom(zoom+.1);
  if(e.key==="-") setZoom(zoom-.1);
});
window.addEventListener("resize",()=>{clearTimeout(window._rz); window._rz=setTimeout(()=>{if(innerWidth<=900&&menuOpen) setMenu(false); updatePageWidth(); if(viewMode==="book") renderCurrentSpread(); else renderDocumentMode();},180);});

(async()=>{
  try{
    setMenu(menuOpen);
    setLoading("Localizando os documentos...");
    await listDocs();
    renderMenu();
    const q=currentParam(), d=docs.find(x=>x.name===q)||docs[0];
    await openDoc(d);
  }catch(err){
    console.error(err);
    fail(err.message||"Não foi possível carregar a biblioteca.");
  }
})();
})();
</script>
</body>
</html>
