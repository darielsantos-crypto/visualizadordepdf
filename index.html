<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#004883">
<title>Biblioteca Corporativa | Lucena Infraestrutura</title>
<style>
:root{
  --blue:#004883;--blue-dark:#00345f;--blue-soft:#0a5a91;--red:#ef3340;
  --stage:#555;--side:310px;--toolbar:58px;--topbar:58px;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:var(--blue);color:#fff}
button,input{font:inherit}button{border:0}.hidden{display:none!important}
.app{width:100%;height:100%;display:grid;grid-template-columns:var(--side) minmax(0,1fr);transition:grid-template-columns .22s ease;background:var(--stage)}
.app.menu-collapsed{grid-template-columns:0 minmax(0,1fr)}
.sidebar{min-width:0;overflow:hidden;background:linear-gradient(180deg,#002d52,#004883);border-right:1px solid #ffffff20;z-index:40}
.sidebar-content{width:var(--side);height:100%;display:grid;grid-template-rows:64px 62px minmax(0,1fr)}
.brand{display:flex;align-items:center;gap:11px;padding:11px 15px;border-bottom:1px solid #ffffff20}
.brand-line{width:8px;height:39px;border-radius:8px;background:var(--red);flex:0 0 auto}.brand strong{display:block;font-size:17px;line-height:1.05}.brand small{display:block;margin-top:4px;font-size:11px;opacity:.72}
.filter{padding:11px}.input{height:40px;display:flex;align-items:center;gap:8px;padding:0 11px;border:1px solid #ffffff2d;border-radius:10px;background:#ffffff10}.input input{width:100%;min-width:0;border:0;outline:0;background:transparent;color:inherit;user-select:text}.input input::placeholder{color:#ffffffa0}
.doc-list{overflow:auto;padding:0 9px 15px;scrollbar-width:thin;scrollbar-color:#ffffff40 transparent}
.doc-item{width:100%;display:grid;grid-template-columns:35px minmax(0,1fr) 18px;align-items:center;gap:9px;padding:10px;border:1px solid transparent;border-radius:11px;background:transparent;color:#fff;text-align:left;cursor:pointer;margin-bottom:5px}.doc-item:hover{background:#ffffff11}.doc-item.active{background:#fff;color:var(--blue-dark);box-shadow:0 8px 22px #0003}.doc-icon{height:40px;border-radius:6px;display:grid;place-items:center;background:#ffffff18;font-size:9px;font-weight:800}.doc-item.active .doc-icon{background:var(--red);color:#fff}.doc-name{font-size:13px;font-weight:700;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.doc-arrow{opacity:.45;font-size:18px}
.viewer{position:relative;min-width:0;min-height:0;display:grid;grid-template-rows:var(--topbar) minmax(0,1fr) var(--toolbar);background:var(--stage)}
.menu-toggle{position:absolute;left:-18px;top:50%;z-index:55;width:36px;height:64px;border-radius:0 12px 12px 0;background:var(--blue);color:#fff;box-shadow:4px 0 14px #0004;cursor:pointer;font-size:22px;transition:left .22s ease}.app.menu-collapsed .menu-toggle{left:0}.menu-toggle:hover{background:var(--blue-soft)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 10px 7px 27px;background:var(--blue);border-bottom:1px solid #ffffff20;z-index:30}.top-left,.top-right{display:flex;align-items:center;gap:7px;min-width:0}.title{min-width:0}.title strong{display:block;max-width:min(47vw,760px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}.title small{display:block;margin-top:3px;font-size:10px;opacity:.65}
.tool{height:40px;min-width:40px;padding:0 11px;border:1px solid #ffffff2b;border-radius:10px;background:#ffffff10;color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px}.tool:hover{background:#ffffff1d}.tool:disabled{opacity:.32;cursor:not-allowed}.mode{display:flex;height:40px;padding:3px;border:1px solid #ffffff2b;border-radius:10px;background:#0002}.mode button{height:32px;padding:0 11px;border-radius:7px;background:transparent;color:#ffffffb8;cursor:pointer;font-size:12px;font-weight:700}.mode button.active{background:#fff;color:var(--blue-dark)}
.stage{position:relative;min-width:0;min-height:0;overflow:auto;background:radial-gradient(circle at center,#ffffff10,transparent 48%),var(--stage);padding:18px;scrollbar-color:#ffffff55 #444}.stage-center{min-width:100%;min-height:100%;display:flex;align-items:center;justify-content:center}
.book-shell{position:relative;display:flex;align-items:stretch;justify-content:center;gap:0;perspective:1800px;transform-style:preserve-3d;transition:transform .18s ease,opacity .18s ease}.book-shell.exit-next{transform:translateX(-2%) rotateY(-7deg);opacity:.22}.book-shell.exit-prev{transform:translateX(2%) rotateY(7deg);opacity:.22}.book-shell.enter-next{animation:enterNext .22s ease}.book-shell.enter-prev{animation:enterPrev .22s ease}@keyframes enterNext{from{transform:translateX(2%) rotateY(7deg);opacity:.25}to{transform:none;opacity:1}}@keyframes enterPrev{from{transform:translateX(-2%) rotateY(-7deg);opacity:.25}to{transform:none;opacity:1}}
.book-page-slot{position:relative;flex:0 0 auto;background:#fff;box-shadow:0 18px 45px #0008;overflow:hidden}.book-page-slot.left{border-radius:4px 0 0 4px;box-shadow:-13px 18px 38px #0006}.book-page-slot.right{border-radius:0 4px 4px 0;box-shadow:13px 18px 38px #0006}.book-page-slot.left::after,.book-page-slot.right::after{content:"";position:absolute;top:0;bottom:0;width:18px;z-index:5;pointer-events:none}.book-page-slot.left::after{right:0;background:linear-gradient(90deg,transparent,#0002)}.book-page-slot.right::after{left:0;background:linear-gradient(90deg,#0002,transparent)}.blank-page{background:linear-gradient(90deg,#f8f8f8,#fff)}
.pdf-page{position:relative;background:#fff;overflow:hidden;box-shadow:0 12px 35px #0007}.pdf-page canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.textLayer{position:absolute;inset:0;overflow:hidden;opacity:1;line-height:1;transform-origin:0 0;z-index:3;user-select:text;-webkit-user-select:text;cursor:text}.textLayer span,.textLayer br{color:transparent;position:absolute;white-space:pre;transform-origin:0 0;user-select:text;-webkit-user-select:text;cursor:text}.textLayer ::selection{background:rgba(0,110,255,.38)}.textLayer ::-moz-selection{background:rgba(0,110,255,.38)}
.document-stack{width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;padding:4px 0 30px}.document-placeholder{position:relative;background:#fff;box-shadow:0 14px 38px #0008;flex:0 0 auto}.page-loading{position:absolute;inset:0;display:grid;place-items:center;color:#6b7780;font-size:12px;background:#fff}
.toolbar{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px calc(7px + env(safe-area-inset-bottom));background:var(--blue);border-top:1px solid #ffffff20;z-index:30}.counter{min-width:104px;text-align:center;font-size:12px;font-weight:800}.zoom-label{min-width:48px;text-align:center;font-size:11px;opacity:.72}
.loader{position:absolute;inset:0;z-index:70;display:grid;place-items:center;background:var(--stage);transition:.2s}.loader.hide{opacity:0;visibility:hidden;pointer-events:none}.load{text-align:center;padding:20px}.spinner{width:46px;height:46px;margin:0 auto 15px;border:4px solid #ffffff3b;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load b{display:block;font-size:17px}.load span{display:block;margin-top:7px;font-size:12px;opacity:.75}
.error{display:none;position:absolute;z-index:80;width:min(580px,90vw);padding:24px;border-radius:16px;background:#00345ff8;box-shadow:0 24px 60px #0008;text-align:center}.error.show{display:block}.error h2{margin:0 0 10px;font-size:20px}.error p{margin:0;font-size:13px;line-height:1.45}
.search-panel{display:none;position:absolute;top:66px;right:12px;z-index:90;width:min(400px,calc(100vw - 24px));max-height:72vh;background:#f7fafc;color:#173044;border-radius:14px;box-shadow:0 24px 65px #0009;overflow:hidden}.search-panel.open{display:grid;grid-template-rows:auto minmax(0,1fr)}.search-head{padding:10px;border-bottom:1px solid #d6e0e7}.search-head .input{border-color:#c9d6df;background:#fff}.search-head input{color:#173044}.search-head input::placeholder{color:#748594}.results{overflow:auto;padding:7px}.result{width:100%;padding:10px;border-radius:9px;background:transparent;color:#173044;text-align:left;cursor:pointer}.result:hover{background:#e7f1f7}.result b{display:block;color:var(--blue);margin-bottom:4px}.result span{font-size:12px;line-height:1.35;color:#586b7b}
.overlay{display:none;position:fixed;inset:0;background:#0008;z-index:35}
@media(max-width:920px){:root{--side:min(310px,88vw)}.app,.app.menu-collapsed{grid-template-columns:1fr}.sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);transform:translateX(-102%);transition:transform .22s ease;box-shadow:18px 0 40px #0005}.sidebar.open{transform:translateX(0)}.overlay.show{display:block}.menu-toggle{left:0}.title strong{max-width:38vw}.label{display:none}}
@media(max-width:650px){.viewer{grid-template-rows:54px minmax(0,1fr) 58px}.topbar{padding:6px 6px 6px 42px}.title small{display:none}.title strong{max-width:30vw}.mode button{padding:0 8px;font-size:11px}.tool{padding:0 9px}.stage{padding:7px}.toolbar .tool.first,.toolbar .tool.last{display:none}.counter{min-width:84px}}
</style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<main class="app" id="app">
  <aside class="sidebar" id="sidebar"><div class="sidebar-content">
    <div class="brand"><div class="brand-line"></div><div><strong>Biblioteca Corporativa</strong><small>Lucena Infraestrutura</small></div></div>
    <div class="filter"><div class="input">⌕<input id="docFilter" type="search" placeholder="Localizar documento..."></div></div>
    <nav class="doc-list" id="docList"></nav>
  </div></aside>

  <section class="viewer">
    <button class="menu-toggle" id="menuToggle" title="Abrir ou recolher menu">‹</button>
    <header class="topbar">
      <div class="top-left"><div class="title"><strong id="title">Biblioteca Corporativa</strong><small id="subtitle"></small></div></div>
      <div class="top-right">
        <div class="mode"><button id="bookMode" class="active">Livreto</button><button id="documentMode">Documento</button></div>
        <button class="tool" id="searchButton">⌕ <span class="label">Pesquisar</span></button>
        <button class="tool" id="downloadButton">⇩ <span class="label">Baixar</span></button>
        <button class="tool" id="fullscreenButton">⛶</button>
      </div>
    </header>

    <section class="stage" id="stage">
      <div class="stage-center" id="stageCenter"></div>
      <div class="loader" id="loader"><div class="load"><div class="spinner"></div><b>Carregando documento</b><span id="loaderText">Localizando os PDFs...</span></div></div>
      <div class="error" id="error"><h2>Não foi possível abrir</h2><p id="errorText"></p></div>
      <div class="search-panel" id="searchPanel"><div class="search-head"><div class="input">⌕<input id="textSearch" type="search" placeholder="Pesquisar palavra ou expressão..."></div></div><div class="results" id="results"></div></div>
    </section>

    <footer class="toolbar">
      <button class="tool first" id="firstButton">⏮</button><button class="tool" id="previousButton">←</button><div class="counter" id="counter">0 / 0</div><button class="tool" id="nextButton">→</button><button class="tool last" id="lastButton">⏭</button>
      <button class="tool" id="zoomOutButton">−</button><div class="zoom-label" id="zoomLabel">100%</div><button class="tool" id="zoomInButton">＋</button><button class="tool" id="fitButton">Ajustar</button>
    </footer>
  </section>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(()=>{"use strict";
const OWNER="darielsantos-crypto",REPO="visualizadordepdf",BRANCH="main",FOLDER="pdf";
const $=id=>document.getElementById(id);
const E={app:$("app"),sidebar:$("sidebar"),overlay:$("overlay"),menuToggle:$("menuToggle"),docFilter:$("docFilter"),docList:$("docList"),title:$("title"),subtitle:$("subtitle"),bookMode:$("bookMode"),documentMode:$("documentMode"),searchButton:$("searchButton"),downloadButton:$("downloadButton"),fullscreenButton:$("fullscreenButton"),stage:$("stage"),stageCenter:$("stageCenter"),loader:$("loader"),loaderText:$("loaderText"),error:$("error"),errorText:$("errorText"),searchPanel:$("searchPanel"),textSearch:$("textSearch"),results:$("results"),firstButton:$("firstButton"),previousButton:$("previousButton"),counter:$("counter"),nextButton:$("nextButton"),lastButton:$("lastButton"),zoomOutButton:$("zoomOutButton"),zoomLabel:$("zoomLabel"),zoomInButton:$("zoomInButton"),fitButton:$("fitButton")};
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
let docs=[],active=null,pdf=null,total=0,current=0,zoom=1,mode="book",menuOpen=innerWidth>920,loadToken=0,pageRatios=[],pageTextPromises=[],pageTexts=[],docObserver=null,transitioning=false,resizeTimer=null;
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
const clean=n=>decodeURIComponent(n).replace(/\.pdf$/i,"").replace(/[_-]+/g," ").replace(/\s+/g," ").trim();
function loading(m){E.loaderText.textContent=m;E.loader.classList.remove("hide");E.error.classList.remove("show")}
function hideLoading(){E.loader.classList.add("hide")}
function fail(m){E.errorText.textContent=m;E.error.classList.add("show");hideLoading()}
function localPdfUrl(name){return `${FOLDER}/${name.split("/").map(encodeURIComponent).join("/")}`}
async function listDocs(){const cacheKey="lucena-pdf-list-v4";try{const cached=JSON.parse(localStorage.getItem(cacheKey)||"null");if(cached&&Date.now()-cached.time<600000&&Array.isArray(cached.items))docs=cached.items}catch{};try{const url=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}?ref=${BRANCH}`,r=await fetch(url,{headers:{Accept:"application/vnd.github+json"},cache:"no-store"});if(!r.ok)throw Error();const items=await r.json();docs=items.filter(x=>x.type==="file"&&/\.pdf$/i.test(x.name)).map(x=>({name:x.name,title:clean(x.name),url:localPdfUrl(x.name)})).sort((a,b)=>a.title.localeCompare(b.title,"pt-BR"));localStorage.setItem(cacheKey,JSON.stringify({time:Date.now(),items:docs}))}catch{if(!docs.length)throw Error("Não foi possível consultar os PDFs da pasta /pdf.")};if(!docs.length)throw Error("Nenhum PDF foi encontrado na pasta /pdf.")}
function renderMenu(q=""){q=q.trim().toLowerCase();E.docList.innerHTML="";docs.filter(d=>!q||d.title.toLowerCase().includes(q)).forEach(d=>{const b=document.createElement("button");b.className="doc-item"+(active&&active.name===d.name?" active":"");b.innerHTML=`<span class="doc-icon">PDF</span><span class="doc-name">${esc(d.title)}</span><span class="doc-arrow">›</span>`;b.onclick=()=>openDoc(d);E.docList.appendChild(b)});if(!E.docList.children.length)E.docList.innerHTML='<div style="padding:18px 10px;font-size:13px;opacity:.7">Nenhum documento encontrado.</div>'}
function setMenu(open){menuOpen=open;if(innerWidth<=920){E.sidebar.classList.toggle("open",open);E.overlay.classList.toggle("show",open)}else E.app.classList.toggle("menu-collapsed",!open);E.menuToggle.textContent=open?"‹":"›";clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>renderCurrent(false),250)}
function updateCounter(){let label=total?String(current+1):"0";if(mode==="book"&&innerWidth>760&&current>0){const start=current%2===1?current:current-1;const end=Math.min(total-1,start+1);label=start===end?String(start+1):`${start+1}–${end+1}`}E.counter.textContent=`${label} / ${total}`;E.firstButton.disabled=current<=0;E.previousButton.disabled=current<=0;E.nextButton.disabled=!total||current>=total-1;E.lastButton.disabled=!total||current>=total-1}
async function pageText(index){if(pageTexts[index]!=null)return pageTexts[index];if(!pageTextPromises[index])pageTextPromises[index]=(async()=>{const p=await pdf.getPage(index+1),tc=await p.getTextContent();return tc.items.map(x=>x.str).join(" ")})();pageTexts[index]=await pageTextPromises[index];return pageTexts[index]}
async function makePage(index,width,token){const p=await pdf.getPage(index+1);if(token!==loadToken)return null;const base=p.getViewport({scale:1}),cssScale=width/base.width,cssViewport=p.getViewport({scale:cssScale}),dpr=Math.min(devicePixelRatio||1,2),renderViewport=p.getViewport({scale:cssScale*dpr});const wrap=document.createElement("div");wrap.className="pdf-page";wrap.style.width=`${cssViewport.width}px`;wrap.style.height=`${cssViewport.height}px`;const canvas=document.createElement("canvas");canvas.width=Math.floor(renderViewport.width);canvas.height=Math.floor(renderViewport.height);canvas.style.width=`${cssViewport.width}px`;canvas.style.height=`${cssViewport.height}px`;const ctx=canvas.getContext("2d",{alpha:false});ctx.fillStyle="#fff";ctx.fillRect(0,0,canvas.width,canvas.height);const textLayer=document.createElement("div");textLayer.className="textLayer";textLayer.style.width=`${cssViewport.width}px`;textLayer.style.height=`${cssViewport.height}px`;textLayer.style.setProperty("--scale-factor",String(cssViewport.scale));wrap.append(canvas,textLayer);await p.render({canvasContext:ctx,viewport:renderViewport,background:"#fff"}).promise;if(token!==loadToken)return null;try{const tc=await p.getTextContent();const task=pdfjsLib.renderTextLayer({textContentSource:tc,container:textLayer,viewport:cssViewport,textDivs:[]});if(task&&task.promise)await task.promise;else if(task)await task}catch(e){console.warn("Text layer",e)}return wrap}
function bookPageWidth(){const availableW=Math.max(280,E.stage.clientWidth-42),availableH=Math.max(300,E.stage.clientHeight-42),single=innerWidth<=760,ratio=pageRatios[current]||1.414;let w=Math.min(single?availableW:availableW/2,availableH/ratio);return Math.max(220,w*zoom)}
function displayedBookPages(){if(innerWidth<=760)return[current];if(current===0)return[null,0];const start=current%2===1?current:current-1;return[start,start+1<total?start+1:null]}
async function renderBook(animate=""){const token=loadToken;E.stageCenter.innerHTML="";const shell=document.createElement("div");shell.className="book-shell"+(animate?` enter-${animate}`:"");const indices=displayedBookPages(),w=bookPageWidth();for(let i=0;i<indices.length;i++){const slot=document.createElement("div");slot.className="book-page-slot "+(indices.length===1?"right":i===0?"left":"right");slot.style.width=`${w}px`;const idx=indices[i];const ratio=idx==null?(pageRatios[0]||1.414):(pageRatios[idx]||1.414);slot.style.height=`${w*ratio}px`;if(idx==null)slot.classList.add("blank-page");else{const page=await makePage(idx,w,token);if(!page)return;slot.appendChild(page)}shell.appendChild(slot)}E.stageCenter.appendChild(shell);updateCounter()}
function docPageWidth(){return Math.max(250,Math.min(940,E.stage.clientWidth-48)*zoom)}
function stopObserver(){if(docObserver){docObserver.disconnect();docObserver=null}}
async function renderDocPlaceholder(ph,index,width,token){if(ph.dataset.loaded==="1"||ph.dataset.loading==="1")return;ph.dataset.loading="1";const page=await makePage(index,width,token);if(!page)return;ph.replaceChildren(page);ph.dataset.loaded="1";ph.dataset.loading="0"}
function renderDocument(){stopObserver();E.stageCenter.innerHTML="";E.stageCenter.style.alignItems="flex-start";const stack=document.createElement("div");stack.className="document-stack";const width=docPageWidth(),token=loadToken;for(let i=0;i<total;i++){const ph=document.createElement("div");ph.className="document-placeholder";ph.dataset.index=i;ph.style.width=`${width}px`;ph.style.height=`${width*(pageRatios[i]||1.414)}px`;ph.innerHTML='<div class="page-loading">Carregando página...</div>';stack.appendChild(ph)}E.stageCenter.appendChild(stack);docObserver=new IntersectionObserver(entries=>{entries.forEach(entry=>{if(entry.isIntersecting)renderDocPlaceholder(entry.target,Number(entry.target.dataset.index),width,token)})},{root:E.stage,rootMargin:"700px 0px",threshold:.01});stack.querySelectorAll(".document-placeholder").forEach(x=>docObserver.observe(x));requestAnimationFrame(()=>goToPage(current,false));updateCounter()}
async function renderCurrent(animate=""){if(!pdf)return;if(mode==="book"){E.stageCenter.style.alignItems="center";await renderBook(animate)}else renderDocument()}
async function animateTo(target,direction){if(transitioning||target===current)return;transitioning=true;const shell=E.stageCenter.querySelector(".book-shell");if(shell){shell.classList.add(direction==="next"?"exit-next":"exit-prev");await new Promise(r=>setTimeout(r,160))}current=target;await renderBook(direction);transitioning=false}
function targetNext(){if(innerWidth<=760)return Math.min(total-1,current+1);if(current===0)return Math.min(total-1,1);const start=current%2===1?current:current-1;return Math.min(total-1,start+2)}
function targetPrev(){if(innerWidth<=760)return Math.max(0,current-1);if(current<=1)return 0;const start=current%2===1?current:current-1;return Math.max(1,start-2)}
function goToPage(index,smooth=true){index=Math.max(0,Math.min(total-1,index));if(mode==="book"){const target=innerWidth<=760?index:(index===0?0:(index%2===1?index:index-1));const direction=target>=current?"next":"prev";animateTo(target,direction)}else{current=index;const el=E.stageCenter.querySelector(`[data-index="${index}"]`);if(el)el.scrollIntoView({behavior:smooth?"smooth":"auto",block:"start"});updateCounter()}}
function syncDocPage(){if(mode!=="document")return;const top=E.stage.getBoundingClientRect().top+24;let best=0,dist=Infinity;E.stageCenter.querySelectorAll(".document-placeholder").forEach((el,i)=>{const d=Math.abs(el.getBoundingClientRect().top-top);if(d<dist){dist=d;best=i}});if(best!==current){current=best;updateCounter()}}
function setZoom(v){zoom=Math.max(.7,Math.min(1.8,v));E.zoomLabel.textContent=Math.round(zoom*100)+"%";renderCurrent(false)}
function setMode(next){if(mode===next)return;mode=next;E.bookMode.classList.toggle("active",mode==="book");E.documentMode.classList.toggle("active",mode==="document");E.stage.scrollTo({top:0,left:0});renderCurrent(false)}
async function indexTexts(token){for(let i=0;i<total;i++){if(token!==loadToken)return;try{await pageText(i)}catch{pageTexts[i]=""};if(i%3===0)await new Promise(r=>setTimeout(r,0))}}
async function openDoc(d){const token=++loadToken;active=d;current=0;zoom=1;E.zoomLabel.textContent="100%";renderMenu(E.docFilter.value);history.replaceState(null,"",`${location.pathname}?documento=${encodeURIComponent(d.name)}`);E.title.textContent=d.title;E.subtitle.textContent="";E.searchPanel.classList.remove("open");stopObserver();E.stageCenter.innerHTML="";total=0;pageRatios=[];pageTexts=[];pageTextPromises=[];updateCounter();loading("Abrindo documento...");try{const task=pdfjsLib.getDocument({url:d.url,cMapPacked:true,disableAutoFetch:false,disableStream:false});pdf=await task.promise;if(token!==loadToken)return;total=pdf.numPages;for(let i=0;i<total;i++){const p=await pdf.getPage(i+1),v=p.getViewport({scale:1});pageRatios[i]=v.height/v.width;if(i===0){hideLoading();await renderCurrent(false)}}if(token!==loadToken)return;await renderCurrent(false);hideLoading();indexTexts(token)}catch(e){console.error(e);fail("O PDF foi localizado, mas não pôde ser aberto. Atualize a página e tente novamente.")}}
function search(q){q=q.trim().toLowerCase();E.results.innerHTML="";if(q.length<2){E.results.innerHTML='<div style="padding:14px;font-size:13px;color:#657786">Digite pelo menos duas letras.</div>';return}let hits=0;pageTexts.forEach((text,i)=>{if(text==null)return;const low=text.toLowerCase(),pos=low.indexOf(q);if(pos<0)return;hits++;const ex=text.slice(Math.max(0,pos-55),Math.min(text.length,pos+q.length+95)).replace(/\s+/g," ");const b=document.createElement("button");b.className="result";b.innerHTML=`<b>Página ${i+1}</b><span>...${esc(ex)}...</span>`;b.onclick=()=>{goToPage(i);E.searchPanel.classList.remove("open")};E.results.appendChild(b)});if(!hits)E.results.innerHTML='<div style="padding:14px;font-size:13px;color:#657786">Nenhuma ocorrência encontrada ou o documento ainda está sendo indexado.</div>'}
E.menuToggle.onclick=()=>setMenu(!menuOpen);E.overlay.onclick=()=>setMenu(false);E.docFilter.oninput=e=>renderMenu(e.target.value);E.bookMode.onclick=()=>setMode("book");E.documentMode.onclick=()=>setMode("document");E.searchButton.onclick=()=>{E.searchPanel.classList.toggle("open");if(E.searchPanel.classList.contains("open"))setTimeout(()=>E.textSearch.focus(),30)};E.textSearch.oninput=e=>{clearTimeout(E.textSearch._t);E.textSearch._t=setTimeout(()=>search(e.target.value),180)};E.downloadButton.onclick=async()=>{if(!active)return;try{const r=await fetch(active.url),blob=await r.blob(),u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download=active.name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000)}catch{window.open(active.url,"_blank")}};E.fullscreenButton.onclick=async()=>{try{document.fullscreenElement?await document.exitFullscreen():await document.documentElement.requestFullscreen()}catch{}};E.firstButton.onclick=()=>goToPage(0);E.previousButton.onclick=()=>goToPage(mode==="book"?targetPrev():current-1);E.nextButton.onclick=()=>goToPage(mode==="book"?targetNext():current+1);E.lastButton.onclick=()=>goToPage(total-1);E.zoomOutButton.onclick=()=>setZoom(zoom-.1);E.zoomInButton.onclick=()=>setZoom(zoom+.1);E.fitButton.onclick=()=>setZoom(1);E.stage.addEventListener("scroll",()=>{clearTimeout(E.stage._s);E.stage._s=setTimeout(syncDocPage,80)});document.addEventListener("keydown",e=>{if(e.key==="Escape")E.searchPanel.classList.remove("open");if(document.activeElement?.tagName==="INPUT")return;if(e.key==="ArrowLeft")E.previousButton.click();if(e.key==="ArrowRight")E.nextButton.click();if(e.key==="Home")goToPage(0);if(e.key==="End")goToPage(total-1);if(e.key==="+"||e.key==="=")setZoom(zoom+.1);if(e.key==="-")setZoom(zoom-.1)});window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{if(innerWidth<=920&&menuOpen){E.sidebar.classList.add("open");E.overlay.classList.add("show")}renderCurrent(false)},180)});
(async()=>{try{setMenu(menuOpen);loading("Localizando documentos...");await listDocs();renderMenu();const q=new URLSearchParams(location.search).get("documento"),d=docs.find(x=>x.name===q)||docs[0];await openDoc(d)}catch(e){console.error(e);fail(e.message||"Não foi possível carregar a biblioteca.")}})();
})();
